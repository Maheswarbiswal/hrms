name: Deploy HRMS to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to hrms.softmateconsulting.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR="/var/www/hrms"
            VENV="$APP_DIR/venv"

            echo ">>> Fixing git ownership"
            git config --global --add safe.directory $APP_DIR 2>/dev/null || true

            echo ">>> Pulling latest code"
            cd $APP_DIR
            git fetch --all
            git reset --hard origin/main

            echo ">>> Activating virtualenv"
            source $VENV/bin/activate

            echo ">>> Installing requirements"
            pip install -r requirements.txt --quiet

            echo ">>> Running migrations"
            python manage.py migrate --noinput

            echo ">>> Collecting static files"
            python manage.py collectstatic --noinput

            echo ">>> Restarting services"
            systemctl restart gunicorn_hrms
            systemctl reload nginx

            echo ">>> Deployment successful!"

      - name: Notify success
        if: success()
        run: echo "✅ HRMS deployed successfully to https://hrms.softmateconsulting.com"

      - name: Notify failure
        if: failure()
        run: echo "❌ HRMS deployment failed. Check logs above."
